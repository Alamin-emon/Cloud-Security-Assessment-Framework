# =============================================================================
#  ZeusCloud Docker Compose — ICT Lab
#
#  Usage:
#    1. Copy .env.example to .env and fill in your AWS credentials
#    2. docker compose up -d
#    3. Open http://localhost:3000
#    4. Click "Run Scan" in the UI
#    5. Export findings as CSV from the Findings tab
# =============================================================================

version: "3.8"

services:
  # ── Backend API (Python FastAPI) ───────────────────────────────────────────
  backend:
    image: zeuscloudio/zeuscloud-backend:latest
    container_name: zeuscloud-backend
    env_file: .env
    environment:
      NEO4J_URI:      "bolt://neo4j:7687"
      NEO4J_USER:     "neo4j"
      NEO4J_PASSWORD: "zeuscloud-lab-pw"
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── Frontend (React) ────────────────────────────────────────────────────────
  frontend:
    image: zeuscloudio/zeuscloud-frontend:latest
    container_name: zeuscloud-frontend
    environment:
      REACT_APP_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Neo4j Graph Database ────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.12-community
    container_name: zeuscloud-neo4j
    environment:
      NEO4J_AUTH:                         "neo4j/zeuscloud-lab-pw"
      NEO4J_PLUGINS:                      '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # Neo4j browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "zeuscloud-lab-pw", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
